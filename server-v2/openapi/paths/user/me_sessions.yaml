get:
  tags:
    - Auth
  operationId: userAuthSessionList
  summary: 列出当前用户会话
  security:
    - sessionAuth: []
  parameters:
    - $ref: ../../components/parameters/page.yaml
    - $ref: ../../components/parameters/page_size.yaml
    - $ref: ../../components/parameters/sort.yaml
    - $ref: ../../components/parameters/order.yaml
  responses:
    "200":
      description: 会话列表。
      content:
        application/json:
          schema:
            type: object
            additionalProperties: false
            required:
              - data
              - meta
            properties:
              data:
                type: array
                items:
                  type: object
                  additionalProperties: false
                  required:
                    - id
                    - userId
                    - createdAt
                  properties:
                    id:
                      type: string
                      format: uuid
                    userId:
                      type: string
                      format: uuid
                    createdAt:
                      type: string
                      format: date-time
              meta:
                $ref: ../../components/schemas/common/pagination_meta.yaml
    "401":
      description: 未认证。
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/common/problem.yaml
    "403":
      description: 无权限。
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/common/problem.yaml
delete:
  tags:
    - Auth
  operationId: userAuthSessionDelete
  summary: 撤销当前会话
  security:
    - sessionAuth: []
  responses:
    "200":
      description: 会话已撤销。
      content:
        application/json:
          schema:
            type: object
            additionalProperties: false
            required:
              - data
              - meta
            properties:
              data:
                type: object
                additionalProperties: false
                required:
                  - revoked
                  - revokedAt
                properties:
                  revoked:
                    type: boolean
                  revokedAt:
                    type: string
                    format: date-time
              meta:
                type: object
                additionalProperties: false
    "401":
      description: 未认证。
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/common/problem.yaml
    "403":
      description: 无权限。
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/common/problem.yaml
