get:
  tags:
    - Auth
  operationId: userAuthSessionList
  summary: 列出当前用户会话
  security:
    - sessionAuth: []
  parameters:
    - $ref: '../../openapi.yaml#/components/parameters/page'
    - $ref: '../../openapi.yaml#/components/parameters/pageSize'
    - $ref: '../../openapi.yaml#/components/parameters/sort'
    - $ref: '../../openapi.yaml#/components/parameters/order'
  responses:
    "200":
      description: 会话列表。
      content:
        application/json:
          schema:
            type: object
            additionalProperties: false
            required:
              - data
              - meta
            properties:
              data:
                type: array
                items:
                  type: object
                  additionalProperties: false
                  required:
                    - id
                    - userId
                    - createdAt
                  properties:
                    id:
                      type: string
                      format: uuid
                    userId:
                      type: string
                      format: uuid
                    createdAt:
                      type: string
                      format: date-time
              meta:
                $ref: '../../openapi.yaml#/components/schemas/PaginationMeta'
    "401":
      description: 未认证。
      content:
        application/json:
          schema:
            $ref: '../../openapi.yaml#/components/schemas/Problem'
