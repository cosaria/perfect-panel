post:
  tags:
    - Auth
  operationId: publicAuthPasswordResetCreate
  summary: 创建密码重置
  security: []
  parameters:
    - $ref: '../../openapi.yaml#/components/parameters/idempotencyKey'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          additionalProperties: false
          required:
            - token
            - password
          properties:
            token:
              type: string
              minLength: 1
            password:
              type: string
              minLength: 8
  responses:
    "200":
      description: 密码已重置。
      content:
        application/json:
          schema:
            type: object
            additionalProperties: false
            required:
              - data
              - meta
            properties:
              data:
                type: object
                additionalProperties: false
                required:
                  - id
                  - status
                  - completedAt
                properties:
                  id:
                    type: string
                    format: uuid
                  status:
                    type: string
                    enum:
                      - completed
                  completedAt:
                    type: string
                    format: date-time
              meta:
                type: object
                additionalProperties: false
    "400":
      description: 请求格式错误。
      content:
        application/json:
          schema:
            $ref: '../../openapi.yaml#/components/schemas/Problem'
    "409":
      description: 冲突。
      content:
        application/json:
          schema:
            $ref: '../../openapi.yaml#/components/schemas/Problem'
    "422":
      description: 业务校验失败。
      content:
        application/json:
          schema:
            $ref: '../../openapi.yaml#/components/schemas/ValidationProblem'
