post:
  tags:
    - Auth
  operationId: publicAuthSessionCreate
  summary: 创建会话
  security: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          additionalProperties: false
          required:
            - email
            - password
          properties:
            email:
              type: string
              format: email
            password:
              type: string
              minLength: 8
  parameters:
    - $ref: ../../components/parameters/idempotency_key.yaml
  responses:
    "201":
      description: 会话创建成功。
      content:
        application/json:
          schema:
            type: object
            additionalProperties: false
            required:
              - data
              - meta
            properties:
              data:
                type: object
                additionalProperties: false
                required:
                  - id
                  - userId
                  - accessToken
                  - expiresAt
                properties:
                  id:
                    type: string
                    format: uuid
                  userId:
                    type: string
                    format: uuid
                  accessToken:
                    type: string
                  expiresAt:
                    type: string
                    format: date-time
              meta:
                type: object
                additionalProperties: false
    "400":
      description: 请求格式错误。
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/common/problem.yaml
    "409":
      description: 冲突。
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/common/problem.yaml
    "422":
      description: 业务校验失败。
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/common/validation_problem.yaml
