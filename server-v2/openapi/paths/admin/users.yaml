get:
  tags:
    - Access
  operationId: adminAccessUserList
  summary: 列出用户
  security:
    - sessionAuth: []
  parameters:
    - $ref: '../../openapi.yaml#/components/parameters/page'
    - $ref: '../../openapi.yaml#/components/parameters/pageSize'
    - $ref: '../../openapi.yaml#/components/parameters/q'
    - $ref: '../../openapi.yaml#/components/parameters/sort'
    - $ref: '../../openapi.yaml#/components/parameters/order'
  responses:
    "200":
      description: 用户列表。
      content:
        application/json:
          schema:
            type: object
            additionalProperties: false
            required:
              - data
              - meta
            properties:
              data:
                type: array
                items:
                  type: object
                  additionalProperties: false
                  required:
                    - id
                    - email
                    - status
                  properties:
                    id:
                      type: string
                      format: uuid
                    email:
                      type: string
                      format: email
                    status:
                      type: string
                      enum:
                        - active
                        - disabled
              meta:
                $ref: '../../openapi.yaml#/components/schemas/PaginationMeta'
    "401":
      description: 未认证。
      content:
        application/json:
          schema:
            $ref: '../../openapi.yaml#/components/schemas/Problem'
    "403":
      description: 无权限。
      content:
        application/json:
          schema:
            $ref: '../../openapi.yaml#/components/schemas/Problem'
post:
  tags:
    - Access
  operationId: adminAccessUserCreate
  summary: 创建用户
  security:
    - sessionAuth: []
  parameters:
    - $ref: '../../openapi.yaml#/components/parameters/idempotencyKey'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          additionalProperties: false
          required:
            - email
            - status
          properties:
            email:
              type: string
              format: email
            status:
              type: string
              enum:
                - active
                - disabled
  responses:
    "201":
      description: 用户已创建。
      content:
        application/json:
          schema:
            type: object
            additionalProperties: false
            required:
              - data
              - meta
            properties:
              data:
                type: object
                additionalProperties: false
                required:
                  - id
                  - email
                  - status
                properties:
                  id:
                    type: string
                    format: uuid
                  email:
                    type: string
                    format: email
                  status:
                    type: string
                    enum:
                      - active
                      - disabled
              meta:
                type: object
                additionalProperties: false
    "401":
      description: 未认证。
      content:
        application/json:
          schema:
            $ref: '../../openapi.yaml#/components/schemas/Problem'
    "403":
      description: 无权限。
      content:
        application/json:
          schema:
            $ref: '../../openapi.yaml#/components/schemas/Problem'
    "409":
      description: 冲突。
      content:
        application/json:
          schema:
            $ref: '../../openapi.yaml#/components/schemas/Problem'
    "422":
      description: 业务校验失败。
      content:
        application/json:
          schema:
            $ref: '../../openapi.yaml#/components/schemas/ValidationProblem'
