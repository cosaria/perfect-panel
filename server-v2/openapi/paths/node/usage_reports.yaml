post:
  tags:
    - Node
  operationId: nodeUsageReportCreate
  summary: 创建用量上报
  security:
    - nodeAuth: []
  parameters:
    - $ref: '../../openapi.yaml#/components/parameters/idempotencyKey'
    - $ref: '../../openapi.yaml#/components/parameters/nodeTimestamp'
    - $ref: '../../openapi.yaml#/components/parameters/nodeNonce'
    - $ref: '../../openapi.yaml#/components/parameters/nodeSignature'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          additionalProperties: false
          required:
            - nodeId
            - usageAt
            - traffic
          properties:
            nodeId:
              type: string
              format: uuid
            usageAt:
              type: string
              format: date-time
            traffic:
              type: object
              additionalProperties: false
              required:
                - uploadBytes
                - downloadBytes
              properties:
                uploadBytes:
                  type: integer
                  format: int64
                  minimum: 0
                downloadBytes:
                  type: integer
                  format: int64
                  minimum: 0
  responses:
    "201":
      description: 用量上报已接收。
      content:
        application/json:
          schema:
            type: object
            additionalProperties: false
            required:
              - data
              - meta
            properties:
              data:
                type: object
                additionalProperties: false
                required:
                  - id
                  - status
                  - acceptedAt
                properties:
                  id:
                    type: string
                    format: uuid
                  status:
                    type: string
                    enum:
                      - accepted
                  acceptedAt:
                    type: string
                    format: date-time
              meta:
                type: object
                additionalProperties: false
    "401":
      description: 未认证。
      content:
        application/json:
          schema:
            $ref: '../../openapi.yaml#/components/schemas/Problem'
    "403":
      description: 无权限。
      content:
        application/json:
          schema:
            $ref: '../../openapi.yaml#/components/schemas/Problem'
    "409":
      description: 冲突。
      content:
        application/json:
          schema:
            $ref: '../../openapi.yaml#/components/schemas/Problem'
