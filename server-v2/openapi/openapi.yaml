openapi: 3.1.0
info:
  title: Server V2 API
  version: 0.1.0
paths:
  /api/v1/public/sessions:
    $ref: ./paths/public/sessions.yaml
  /api/v1/public/verification-tokens:
    $ref: ./paths/public/verification_tokens.yaml
  /api/v1/public/password-reset-requests:
    $ref: ./paths/public/password_reset_requests.yaml
  /api/v1/public/password-resets:
    $ref: ./paths/public/password_resets.yaml
  /api/v1/user/me/sessions:
    $ref: ./paths/user/me_sessions.yaml
  /api/v1/user/me/sessions/{sessionId}:
    delete:
      tags:
        - Auth
      operationId: userAuthSessionDelete
      summary: 撤销当前用户指定会话
      security:
        - sessionAuth: []
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: 会话已撤销。
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - data
                  - meta
                properties:
                  data:
                    type: object
                    additionalProperties: false
                    required:
                      - revoked
                      - revokedAt
                    properties:
                      revoked:
                        type: boolean
                      revokedAt:
                        type: string
                        format: date-time
                  meta:
                    type: object
                    additionalProperties: false
        "401":
          description: 未认证。
          content:
            application/json:
              schema:
                $ref: ./components/schemas/common/problem.yaml
  /api/v1/admin/users:
    $ref: ./paths/admin/users.yaml
  /api/v1/node/usage-reports:
    $ref: ./paths/node/usage_reports.yaml
components:
  parameters:
    page:
      $ref: ./components/parameters/page.yaml
    pageSize:
      $ref: ./components/parameters/page_size.yaml
    q:
      $ref: ./components/parameters/q.yaml
    sort:
      $ref: ./components/parameters/sort.yaml
    order:
      $ref: ./components/parameters/order.yaml
    idempotencyKey:
      $ref: ./components/parameters/idempotency_key.yaml
    nodeTimestamp:
      $ref: ./components/parameters/node_timestamp.yaml
    nodeNonce:
      $ref: ./components/parameters/node_nonce.yaml
    nodeSignature:
      $ref: ./components/parameters/node_signature.yaml
  schemas:
    Problem:
      $ref: ./components/schemas/common/problem.yaml
    ValidationProblem:
      $ref: ./components/schemas/common/validation_problem.yaml
    PaginationMeta:
      $ref: ./components/schemas/common/pagination_meta.yaml
    Money:
      $ref: ./components/schemas/common/money.yaml
  securitySchemes:
    sessionAuth:
      $ref: ./components/security/security.yaml#/sessionAuth
    nodeAuth:
      $ref: ./components/security/security.yaml#/nodeAuth
