# lefthook.yml — 根级 Git hooks 配置
# 统管 server (Go) 和 web (Bun/Biome) 的 pre-commit 与 commit-msg hooks

pre-commit:
  parallel: true
  commands:
    server-fmt:
      root: "server/"
      glob: "*.go"
      run: go fmt ./...
    server-imports:
      root: "server/"
      glob: "*.go"
      run: test -x ../.tools/bin/goimports || { echo "缺少 repo-local goimports，请先在仓库根目录执行 make tools"; exit 1; }; ../.tools/bin/goimports -w .
    server-lint:
      root: "server/"
      glob: "*.go"
      run: test -x ../.tools/bin/golangci-lint || { echo "缺少 repo-local golangci-lint，请先在仓库根目录执行 make tools"; exit 1; }; ../.tools/bin/golangci-lint run
    server-vet:
      root: "server/"
      glob: "*.go"
      run: go vet ./...
    server-test:
      root: "server/"
      glob: "*.go"
      run: go test -v ./...
    web-biome:
      glob: "*.{json,md,js,jsx,cjs,mjs,ts,tsx}"
      run: bunx biome check --write --no-errors-on-unmatched --files-ignore-unknown=true {staged_files}
      stage_fixed: true

commit-msg:
  commands:
    commitlint:
      run: bunx commitlint --edit {1}
