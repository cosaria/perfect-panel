name: Setup Go Server Workspace
description: Set up Go and download server dependencies.
inputs:
  fetch-depth:
    description: Deprecated. Checkout must happen in the workflow job before using this local action.
    required: false
    default: '1'
runs:
  using: composite
  steps:
    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version-file: server/go.mod
        cache-dependency-path: server/go.sum

    - name: Download server dependencies
      shell: bash
      working-directory: server
      run: go mod download
