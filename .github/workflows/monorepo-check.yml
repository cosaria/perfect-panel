name: Monorepo Check

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    name: Detect Changed Areas
    runs-on: ubuntu-latest
    outputs:
      server: ${{ steps.normalize.outputs.server }}
      web: ${{ steps.normalize.outputs.web }}
      shared: ${{ steps.normalize.outputs.shared }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Filter changed files
        if: github.event_name == 'pull_request'
        id: filters
        uses: dorny/paths-filter@v3
        with:
          filters: |
            server:
              - 'server/**'
            web:
              - 'web/**'
            shared:
              - '.github/**'
              - 'Makefile'
              - 'README.md'
              - 'release-manifest.json'
              - 'script/check-workflow-contract.sh'

      - name: Normalize outputs
        id: normalize
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "server=${{ steps.filters.outputs.server }}" >> "$GITHUB_OUTPUT"
            echo "web=${{ steps.filters.outputs.web }}" >> "$GITHUB_OUTPUT"
            echo "shared=${{ steps.filters.outputs.shared }}" >> "$GITHUB_OUTPUT"
          else
            echo "server=true" >> "$GITHUB_OUTPUT"
            echo "web=true" >> "$GITHUB_OUTPUT"
            echo "shared=true" >> "$GITHUB_OUTPUT"
          fi

  workflow-validate:
    name: Workflow Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run actionlint
        uses: rhysd/actionlint@v1

      - name: Check workflow contract
        run: ./script/check-workflow-contract.sh

  server-validate:
    name: Server Validate
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.server == 'true' || needs.changes.outputs.shared == 'true'
    steps:
      - name: Setup Go workspace
        uses: ./.github/actions/setup-go

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          working-directory: server

      - name: Run go vet
        working-directory: server
        run: go vet ./...

      - name: Run go test
        working-directory: server
        run: go test ./...

  web-admin-validate:
    name: Web Admin Validate
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.web == 'true' || needs.changes.outputs.shared == 'true'
    steps:
      - name: Setup Bun workspace
        uses: ./.github/actions/setup-bun

      - name: Lint admin app
        working-directory: web/apps/admin
        run: bun run lint

      - name: Build admin app
        working-directory: web/apps/admin
        run: bun run build

  web-user-validate:
    name: Web User Validate
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.web == 'true' || needs.changes.outputs.shared == 'true'
    steps:
      - name: Setup Bun workspace
        uses: ./.github/actions/setup-bun

      - name: Lint user app
        working-directory: web/apps/user
        run: bun run lint

      - name: Build user app
        working-directory: web/apps/user
        run: bun run build

  monorepo-summary:
    name: Monorepo Summary
    if: always()
    runs-on: ubuntu-latest
    needs:
      - workflow-validate
      - server-validate
      - web-admin-validate
      - web-user-validate
    steps:
      - name: Summarize results
        env:
          WORKFLOW_RESULT: ${{ needs.workflow-validate.result }}
          SERVER_RESULT: ${{ needs.server-validate.result }}
          ADMIN_RESULT: ${{ needs.web-admin-validate.result }}
          USER_RESULT: ${{ needs.web-user-validate.result }}
        run: |
          failure=0
          for result in "$WORKFLOW_RESULT" "$SERVER_RESULT" "$ADMIN_RESULT" "$USER_RESULT"; do
            case "$result" in
              failure|cancelled|timed_out|action_required)
                failure=1
                ;;
            esac
          done

          echo "Migration-window mode: keep this workflow non-required until it has 2 green main runs and 1 green feature PR." >> "$GITHUB_STEP_SUMMARY"
          echo "- workflow-validate: ${WORKFLOW_RESULT}" >> "$GITHUB_STEP_SUMMARY"
          echo "- server-validate: ${SERVER_RESULT}" >> "$GITHUB_STEP_SUMMARY"
          echo "- web-admin-validate: ${ADMIN_RESULT}" >> "$GITHUB_STEP_SUMMARY"
          echo "- web-user-validate: ${USER_RESULT}" >> "$GITHUB_STEP_SUMMARY"

          if [ "$failure" -ne 0 ]; then
            exit 1
          fi
