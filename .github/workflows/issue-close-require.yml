name: Issue Close Require

on:
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: read

jobs:
  issue-close-require:
    permissions:
      issues: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - name: fixed without reply
        uses: actions-cool/issues-helper@v3
        with:
          actions: 'close-issues'
          labels: '✅ Fixed'
          inactive-day: 3
          body: |
            Since the issue was labeled with `✅ Fixed`, but no response in 3 days. This issue will be closed. If you have any questions, you can comment and reply.

            由于该 issue 被标记为已修复，同时 3 天未收到回应。现关闭 issue，若有任何问题，可评论回复。

      - name: need reproduce without reply
        uses: actions-cool/issues-helper@v3
        with:
          actions: 'close-issues'
          labels: '🤔 Need Reproduce'
          inactive-day: 3
          body: |
            Since the issue was labeled with `🤔 Need Reproduce`, but no response in 3 days. This issue will be closed. If you have any questions, you can comment and reply.

            由于该 issue 被标记为需要更多信息，却 3 天未收到回应。现关闭 issue，若有任何问题，可评论回复。

      - name: wont-do without reply
        uses: actions-cool/issues-helper@v3
        with:
          actions: 'close-issues'
          labels: "🙅🏻‍♀️ WON'T DO"
          inactive-day: 3
          body: |
            Since the issue was labeled with `🙅🏻‍♀️ WON'T DO`, and no response in 3 days. This issue will be closed. If you have any questions, you can comment and reply.

            由于该 issue 被标记为暂不处理，同时 3 天未收到回应。现关闭 issue，若有任何问题，可评论回复。
