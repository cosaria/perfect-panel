name: Server Develop

on:
  push:
    branches: [develop]
    paths:
      - 'server/**'
      - '.github/workflows/server-develop.yml'
  pull_request:
    branches: [develop]
    paths:
      - 'server/**'
      - '.github/workflows/server-develop.yml'
  workflow_dispatch:
    inputs:
      noop_publish:
        description: Skip Docker push during manual validation.
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  build-and-deploy:
    name: Server Develop Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve publish mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "push=${{ inputs.noop_publish == false }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "push" ]; then
            echo "push=true" >> "$GITHUB_OUTPUT"
          else
            echo "push=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to Docker Hub
        if: steps.mode.outputs.push == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Get short Git commit ID
        id: vars
        run: echo "commit_id=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        run: docker build --build-arg VERSION=${{ steps.vars.outputs.commit_id }} -t ${{ secrets.DOCKER_USERNAME }}/ppanel-server-dev:${{ steps.vars.outputs.commit_id }} -f server/Dockerfile server

      - name: Push Docker image
        if: steps.mode.outputs.push == 'true'
        run: docker push ${{ secrets.DOCKER_USERNAME }}/ppanel-server-dev:${{ steps.vars.outputs.commit_id }}
