name: Web Publish Release Assets

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag for no-op validation.
        required: false
        default: web-v0.0.0-dryrun
      noop_publish:
        description: Skip asset upload and image push.
        required: false
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  publish:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.event.release.tag_name, 'web-v')
    name: Web Publish Release Assets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun workspace
        uses: ./.github/actions/setup-bun

      - name: Resolve publish mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag_value="${{ inputs.release_tag }}"
            noop_value="${{ inputs.noop_publish }}"
          else
            tag_value="${{ github.event.release.tag_name }}"
            noop_value=false
          fi

          {
            echo "tag=$tag_value"
            echo "noop=$noop_value"
          } >> "$GITHUB_OUTPUT"

      - name: Extract version from package.json
        id: version
        working-directory: web
        run: echo "version=$(jq -r '.version' package.json)" >> "$GITHUB_OUTPUT"

      - name: Verify release tag matches package version
        if: github.event_name == 'release'
        run: test "${{ steps.mode.outputs.tag }}" = "web-v${{ steps.version.outputs.version }}"

      - name: Build publish artifacts
        working-directory: web
        run: |
          chmod +x scripts/publish.sh
          ./scripts/publish.sh

      - name: Upload tar.gz files to release
        if: steps.mode.outputs.noop != 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            web/out/ppanel-admin-web.tar.gz
            web/out/ppanel-user-web.tar.gz
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        if: steps.mode.outputs.noop != 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.mode.outputs.noop != 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: steps.mode.outputs.noop != 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image for ppanel-admin-web
        if: steps.mode.outputs.noop != 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./web
          file: ./web/docker/ppanel-admin-web/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/ppanel-admin-web:latest
            ${{ secrets.DOCKER_USERNAME }}/ppanel-admin-web:${{ steps.version.outputs.version }}

      - name: Build and push Docker image for ppanel-user-web
        if: steps.mode.outputs.noop != 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./web
          file: ./web/docker/ppanel-user-web/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/ppanel-user-web:latest
            ${{ secrets.DOCKER_USERNAME }}/ppanel-user-web:${{ steps.version.outputs.version }}

      - name: Report no-op validation
        if: steps.mode.outputs.noop == 'true'
        run: echo "No-op mode enabled. Build completed without release uploads or Docker pushes."
