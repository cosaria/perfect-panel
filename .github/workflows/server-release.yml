name: Server Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag for manual validation.
        required: false
        default: v0.0.0-dryrun
      noop_publish:
        description: Skip Docker and GitHub publishing.
        required: false
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build-docker:
    name: Server Release Docker
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ppanel-server
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            release_tag="${{ inputs.release_tag }}"
            noop="${{ inputs.noop_publish }}"
          else
            release_tag="$GITHUB_REF_NAME"
            noop=false
          fi

          case "$release_tag" in
            v*) ;;
            *)
              echo "Expected a server release tag starting with v, got: $release_tag" >&2
              exit 1
              ;;
          esac

          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "version=${release_tag#v}" >> "$GITHUB_OUTPUT"
          echo "noop=$noop" >> "$GITHUB_OUTPUT"

      - name: Get short SHA
        id: sha
        run: echo "git_sha=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Set build time
        id: build_time
        run: echo "build_time=$(date --iso-8601=seconds)" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        if: steps.meta.outputs.noop != 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up QEMU
        if: steps.meta.outputs.noop != 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.meta.outputs.noop != 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image in no-op mode
        if: steps.meta.outputs.noop == 'true'
        run: docker build --build-arg VERSION=${{ steps.meta.outputs.version }} -f server/Dockerfile server

      - name: Build and push Docker image for main release
        if: steps.meta.outputs.noop != 'true' && !contains(steps.meta.outputs.release_tag, 'beta')
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}-${{ steps.sha.outputs.git_sha }}

      - name: Build and push Docker image for beta release
        if: steps.meta.outputs.noop != 'true' && contains(steps.meta.outputs.release_tag, 'beta')
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:beta
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}-${{ steps.sha.outputs.git_sha }}

  release-notes:
    name: Server Release Notes
    runs-on: ubuntu-latest
    needs: build-docker
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go workspace
        uses: ./.github/actions/setup-go

      - name: Resolve release metadata
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "noop=${{ inputs.noop_publish }}" >> "$GITHUB_OUTPUT"
          else
            echo "noop=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install GoReleaser
        run: go install github.com/goreleaser/goreleaser/v2@latest

      - name: Run GoReleaser check
        working-directory: server
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: goreleaser check

      - name: Run GoReleaser release
        if: steps.meta.outputs.noop != 'true'
        working-directory: server
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: goreleaser release --clean

  releases-matrix:
    name: Server Release Binary Matrix
    runs-on: ubuntu-latest
    needs: release-notes
    if: github.event_name == 'push' || inputs.noop_publish == false
    strategy:
      matrix:
        goos: [linux, windows, darwin]
        goarch: ['386', amd64, arm64]
        exclude:
          - goarch: '386'
            goos: darwin
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve version
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            release_tag="${{ inputs.release_tag }}"
          else
            release_tag="$GITHUB_REF_NAME"
          fi
          echo "version=${release_tag#v}" >> "$GITHUB_OUTPUT"
          echo "build_time=$(date --iso-8601=seconds)" >> "$GITHUB_OUTPUT"

      - uses: wangyoucao577/go-release-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          goos: ${{ matrix.goos }}
          goarch: ${{ matrix.goarch }}
          asset_name: "ppanel-server-${{ matrix.goos }}-${{ matrix.goarch }}"
          goversion: "https://dl.google.com/go/go1.23.3.linux-amd64.tar.gz"
          project_path: "./server"
          binary_name: "ppanel-server"
          extra_files: LICENSE etc
          ldflags: -X "github.com/perfect-panel/server/pkg/constant.Version=${{ steps.meta.outputs.version }}" -X "github.com/perfect-panel/server/pkg/constant.BuildTime=${{ steps.meta.outputs.build_time }}"
