name: Lint

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.0

      - name: Bootstrap lint toolchain
        run: make bootstrap BUN_INSTALL_FLAGS=--frozen-lockfile

      - name: Run lint gate
        run: make lint
