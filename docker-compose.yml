services:
  mysql:
    image: mysql:8.0
    container_name: ppanel-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ppanel_root_pass
      MYSQL_DATABASE: ppanel
      MYSQL_USER: ppanel
      MYSQL_PASSWORD: ppanel_pass
    ports:
      - "13306:3306"
    volumes:
      - ppanel-mysql-data:/var/lib/mysql
    networks:
      - ppanel
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pppanel_root_pass"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: ppanel-redis
    ports:
      - "16379:6379"
    volumes:
      - ppanel-redis-data:/data
    networks:
      - ppanel
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  ppanel:
    container_name: ppanel
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./server/etc/ppanel.yaml:/app/etc/ppanel.yaml:ro
    networks:
      - ppanel
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/v1/common/site/config"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  ppanel-mysql-data:
  ppanel-redis-data:

networks:
  ppanel:
    name: ppanel-network
    driver: bridge
